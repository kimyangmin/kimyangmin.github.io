<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 시간표</title>
    <style>
        th {
            text-align: center;
            width: 15%;
            padding: 30px;
        }
        td {
            text-align: center;
        }
        td.sys {
            background-color: rgba(201, 201, 255, 0.753);
        }
        td:hover {
            transition: all 0.5s;
            padding: 35px;
            background-color: rgb(136, 136, 250);
            font-size: large;
            font-weight: bold;
        }
        
    </style>
</head>
<body>
    
    <table border="1" style="width: 50%; margin-left: 25%;">
        <caption style="font-size: 25px; font-weight: bold; margin-bottom: 10px; background-color: yellow;">
            2학년 11반 시간표
        </caption>
        <tr>
            <th>교시</th>
            <th>월</th>
            <th>화</th>
            <th>수</th>
            <th>목</th>
            <th>금</th>
        </tr>
        <tr>
            <th>1교시<br>(09:00)</th>
            <td class="sys">시스프</td>
            <td>문학</td>
            <td>영어I</td>
            <td class="sys">시스프</td>
            <td>한국사</td>
        </tr>
        <tr>
            <th>2교시<br>(10:00)</th>
            <td>영어I</td>
            <td class="sys">응프개</td>
            <td>문학</td>
            <td class="sys">시스프</td>
            <td class="sys">응프개</td>
        </tr>
        <tr>
            <th>3교시<br>(11:00)</th>
            <td class="sys">응프개</td>
            <td>체탐</td>
            <td class="sys">응프개</td>
            <td>영어I</td>
            <td class="sys">시스프</td>
        </tr>
        <tr>
            <th>4교시<br>(12:00)</th>
            <td class="sys">응프개</td>
            <td>한국사</td>
            <td class="sys">시스프</td>
            <td>문학</td>
            <td class="sys">시스프</td>
        </tr>
        <tr>
            <th>5교시<br>(13:50)</th>
            <td>자료</td>
            <td class="sys">시스프</td>
            <td>미술</td>
            <td class="sys">시스프</td>
            <td>창체</td>
        </tr>
        <tr>
            <th>6교시<br>(14:50)</th>
            <td>자료</td>
            <td>미술</td>
            <td>자율</td>
            <td>한국사</td>
            <td>창체</td>
        </tr>
        <tr>
            <th>7교시<br>(15:50)</th>
            <td class="sys">응프개</td>
            <td style="background-color: rgb(224, 224, 224);"></td>
            <td style="background-color: rgb(224, 224, 224);"></td>
            <td class="sys">응프개</td>
            <td style="background-color: rgb(224, 224, 224);"></td>
        </tr>
    </table>    
</body>
</html>
