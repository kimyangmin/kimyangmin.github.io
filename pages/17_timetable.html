<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나만의 시간표</title>
  <style>
    body {
      font-family: "Segoe UI", "맑은 고딕", sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 40px 0;
      display: flex;
      justify-content: center;
    }

    table {
      border-collapse: collapse;
      width: 80%;
      max-width: 900px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      background-color: white;
      border-radius: 12px;
    }

    caption {
      font-size: 28px;
      font-weight: bold;
      padding: 20px;
      background: #ffeb3b;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    th, td {
      padding: 20px;
      text-align: center;
      border: 1px solid #b8b8b8;
    }

    th {
      background-color: #f0f0f0;
      font-weight: 600;
      color: black;
    }

    td {
      transition: all 0.3s ease;
      font-size: 16px;
      color: black;
    }

    td.sys {
      background-color: #dde3ff;
      font-weight: 500;
    }

    td:hover {
      background-color: #aebdff;
      font-size: 17px;
      font-weight: bold;
      z-index: 1;
      position: relative;
    }

  </style>
</head>
<body>
  <table>
    <caption>2학년 11반 시간표</caption>
    <tr>
      <th>교시</th>
      <th>월</th>
      <th>화</th>
      <th>수</th>
      <th>목</th>
      <th>금</th>
    </tr>
    <tr>
      <th>1교시<br>(09:00)</th>
      <td class="sys" title="김형준">시스프</td>
      <td title="한수현">문학</td>
      <td title="이승은">영어I</td>
      <td class="sys" title="김형준">시스프</td>
      <td title="유시현">한국사</td>
    </tr>
    <tr>
      <th>2교시<br>(10:00)</th>
      <td title="이승은">영어I</td>
      <td class="sys" title="김형준">응프개</td>
      <td title="한수현">문학</td>
      <td class="sys" title="김형준">시스프</td>
      <td class="sys" title="김형준">응프개</td>
    </tr>
    <tr>
      <th>3교시<br>(11:00)</th>
      <td class="sys" title="김형준">응프개</td>
      <td title="장현석">체탐</td>
      <td class="sys" title="김형준">응프개</td>
      <td title="이승은">영어I</td>
      <td class="sys" title="김형준">시스프</td>
    </tr>
    <tr>
      <th>4교시<br>(12:00)</th>
      <td class="sys" title="김형준">응프개</td>
      <td title="유시현">한국사</td>
      <td class="sys" title="김형준">시스프</td>
      <td title="한수현">문학</td>
      <td class="sys" title="김형준">시스프</td>
    </tr>
    <tr>
      <th>5교시<br>(13:50)</th>
      <td title="최승남">자료</td>
      <td class="sys" title="김형준">시스프</td>
      <td title="박성희">미술</td>
      <td class="sys" title="김형준">시스프</td>
      <td>창체</td>
    </tr>
    <tr>
      <th>6교시<br>(14:50)</th>
      <td title="최승남">자료</td>
      <td title="박성희">미술</td>
      <td>자율</td>
      <td title="유시현">한국사</td>
      <td>창체</td>
    </tr>
    <tr>
      <th>7교시<br>(15:50)</th>
      <td class="sys" title="김형준">응프개</td>
      <td style="background-color: rgb(237, 237, 237);"></td>
      <td style="background-color: rgb(237, 237, 237);"></td>
      <td class="sys" title="김형준">응프개</td>
      <td style="background-color: rgb(237, 237, 237);"></td>
    </tr>
  </table>
</body>
</html>
